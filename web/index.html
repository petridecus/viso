<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Viso</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        body { position: relative; background: #1a1a2e; }
        #canvas {
            width: 100%;
            height: 100%;
        }
        /* Desktop/landscape: panel on the right */
        #ui-panel {
            position: absolute;
            top: 0;
            right: 0;
            width: 340px;
            height: 100%;
            border: none;
        }
        /* Portrait: panel on the bottom */
        @media (orientation: portrait) {
            #ui-panel {
                top: auto;
                bottom: 0;
                right: 0;
                width: 100%;
                height: 50%;
            }
        }
    </style>
</head>
<body>
    <script src="coi-serviceworker.js"></script>

    <canvas id="canvas"></canvas>
    <iframe id="ui-panel" src="ui/index.html"></iframe>

    <script type="module">
        import init_wasm, { init, start, initThreadPool } from './pkg/viso.js';

        async function main() {
            const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
            const PAGE = 65536;
            const maxPages = 1073741824 / PAGE;       // 1 GB (must match linker --max-memory)
            const initialPages = isSafari
                ? 536870912 / PAGE                     // Safari: 512 MB up front (avoids memory.grow)
                : 67108864 / PAGE;                     // Others: 64 MB, grows on demand
            const memory = new WebAssembly.Memory({
                initial: initialPages,
                maximum: maxPages,
                shared: true,
            });

            await init_wasm({ memory });
            await initThreadPool(navigator.hardwareConcurrency);
            init();

            const canvas = document.getElementById('canvas');
            canvas.width = canvas.clientWidth * devicePixelRatio;
            canvas.height = canvas.clientHeight * devicePixelRatio;

            await start(canvas);
        }

        main().catch(e => {
            console.error('Viso init failed:', e);
            const msg = String(e);
            if (msg.includes('dxil.dll') || msg.includes('DXC')) {
                document.body.innerHTML =
                    '<div style="color:#e0e0e0;font-family:system-ui;max-width:480px;' +
                    'margin:80px auto;line-height:1.6">' +
                    '<h2 style="color:#ff6b6b">WebGPU not available</h2>' +
                    '<p>Your browser\'s WebGPU backend failed to initialize because ' +
                    'the DirectX Shader Compiler (<code>dxil.dll</code>) could not be loaded.</p>' +
                    '<p><b>Try one of these:</b></p><ul>' +
                    '<li>Use <b>Chrome</b> or <b>Edge</b> (latest version)</li>' +
                    '<li>Update your current browser to the latest version</li>' +
                    '<li>On Windows, make sure your GPU drivers are up to date</li>' +
                    '</ul></div>';
            } else if (msg.includes('requestAdapter') || msg.includes('no compatible GPU')) {
                document.body.innerHTML =
                    '<div style="color:#e0e0e0;font-family:system-ui;max-width:480px;' +
                    'margin:80px auto;line-height:1.6">' +
                    '<h2 style="color:#ff6b6b">WebGPU not supported</h2>' +
                    '<p>Your browser does not support WebGPU, or no compatible GPU adapter was found.</p>' +
                    '<p><b>Try one of these:</b></p><ul>' +
                    '<li>Use <b>Chrome 113+</b>, <b>Edge 113+</b>, or <b>Safari 18+</b></li>' +
                    '<li>Update your GPU drivers</li>' +
                    '</ul></div>';
            } else {
                document.body.textContent = `Init error: ${e}`;
            }
        });
    </script>
</body>
</html>
