<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Viso</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        body { display: flex; background: #1a1a2e; }
        #canvas {
            flex: 1;
            min-width: 0;
            height: 100%;
        }
        #ui-panel {
            width: 340px;
            height: 100%;
            border: none;
            border-left: 1px solid #333;
        }
    </style>
</head>
<body>
    <script src="coi-serviceworker.js"></script>

    <canvas id="canvas"></canvas>
    <iframe id="ui-panel" src="ui/index.html"></iframe>

    <script type="module">
        import init_wasm, { init, start, initThreadPool } from './pkg/viso.js';

        async function main() {
            await init_wasm();
            await initThreadPool(navigator.hardwareConcurrency);
            init();

            const canvas = document.getElementById('canvas');
            canvas.width = canvas.clientWidth * devicePixelRatio;
            canvas.height = canvas.clientHeight * devicePixelRatio;

            await start(canvas);
        }

        main().catch(e => {
            console.error('Viso init failed:', e);
            document.body.textContent = `Init error: ${e}`;
        });
    </script>
</body>
</html>
