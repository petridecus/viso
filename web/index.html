<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Viso</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        body { display: flex; background: #1a1a2e; }
        #canvas {
            flex: 1;
            min-width: 0;
            height: 100%;
        }
        #ui-panel {
            width: 340px;
            height: 100%;
            border: none;
            border-left: 1px solid #333;
        }

        /* ── Mobile toggle bar (hidden on desktop) ────────────────────── */
        #mobile-toggle {
            display: none;
        }

        /* ── Mobile layout ────────────────────────────────────────────── */
        @media (max-width: 768px) {
            body {
                flex-direction: column;
            }
            #canvas {
                flex: 1;
                width: 100%;
                min-height: 0;
            }
            #mobile-toggle {
                display: flex;
                align-items: center;
                justify-content: center;
                width: 100%;
                height: 32px;
                background: #171717;
                border-top: 1px solid #333;
                cursor: pointer;
                flex-shrink: 0;
                -webkit-tap-highlight-color: transparent;
            }
            #mobile-toggle svg {
                transition: transform 0.25s ease;
                transform: rotate(180deg);
            }
            #mobile-toggle.collapsed svg {
                transform: rotate(0deg);
            }
            #ui-panel {
                width: 100%;
                height: 50%;
                border-left: none;
                border-top: 1px solid #333;
                flex-shrink: 0;
                transition: height 0.25s ease;
            }
            #ui-panel.collapsed {
                height: 0;
                border-top: none;
                overflow: hidden;
            }
        }
    </style>
</head>
<body>
    <script src="coi-serviceworker.js"></script>

    <canvas id="canvas"></canvas>
    <div id="mobile-toggle" onclick="toggleMobilePanel()">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path d="M5 12.5L10 7.5L15 12.5" stroke="#9ca3af" stroke-width="2"
                  stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
    </div>
    <iframe id="ui-panel" src="ui/index.html"></iframe>

    <script>
        function toggleMobilePanel() {
            var panel = document.getElementById('ui-panel');
            var toggle = document.getElementById('mobile-toggle');
            panel.classList.toggle('collapsed');
            toggle.classList.toggle('collapsed');
        }
    </script>
    <script type="module">
        import init_wasm, { init, start, initThreadPool } from './pkg/viso.js';

        async function main() {
            const isSafari = /^((?!chrome|android).)*safari/i.test(navigator.userAgent);
            const PAGE = 65536;
            const maxPages = 1073741824 / PAGE;       // 1 GB (must match linker --max-memory)
            const initialPages = isSafari
                ? 536870912 / PAGE                     // Safari: 512 MB up front (avoids memory.grow)
                : 67108864 / PAGE;                     // Others: 64 MB, grows on demand
            const memory = new WebAssembly.Memory({
                initial: initialPages,
                maximum: maxPages,
                shared: true,
            });

            await init_wasm({ memory });
            await initThreadPool(navigator.hardwareConcurrency);
            init();

            const canvas = document.getElementById('canvas');
            canvas.width = canvas.clientWidth * devicePixelRatio;
            canvas.height = canvas.clientHeight * devicePixelRatio;

            await start(canvas);
        }

        main().catch(e => {
            console.error('Viso init failed:', e);
            document.body.textContent = `Init error: ${e}`;
        });
    </script>
</body>
</html>
