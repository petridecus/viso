name: Pages

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'web/**'
      - 'src/**'
      - 'Cargo.toml'
      - '.cargo/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup mdBook
        uses: peaceiris/actions-mdbook@v2
        with:
          mdbook-version: 'latest'

      - name: Install nightly toolchain
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: wasm32-unknown-unknown
          components: rust-src

      - name: Install wasm-bindgen-cli
        # Version must match the wasm-bindgen library version pinned in
        # Cargo.lock — bindgen rejects mismatched schema versions.
        run: cargo install wasm-bindgen-cli --version 0.2.120 --locked

      - name: Install trunk
        run: cargo install trunk

      - name: Build mdBook
        run: mdbook build docs

      - name: Build viso-ui
        run: trunk build --release
        working-directory: crates/viso-ui

      - name: Build WASM engine
        run: |
          RUSTFLAGS="\
            -C target-feature=+atomics,+bulk-memory,+mutable-globals,-reference-types,-multivalue \
            -C link-arg=--shared-memory \
            -C link-arg=--import-memory \
            -C link-arg=--max-memory=1073741824 \
            -C link-arg=--export=__wasm_init_tls \
            -C link-arg=--export=__tls_size \
            -C link-arg=--export=__tls_align \
            -C link-arg=--export=__tls_base" \
          cargo +nightly build \
            --target wasm32-unknown-unknown \
            --features web \
            --no-default-features \
            --release \
            -Z build-std=panic_abort,std,alloc
          wasm-bindgen --target web --out-dir pkg \
            target/wasm32-unknown-unknown/release/viso.wasm

      - name: Assemble site
        run: |
          mkdir -p site
          cp -r docs/book/* site/
          mkdir -p site/demo
          cp -r web/* site/demo/
          cp -r pkg site/demo/pkg
          cp -r crates/viso-ui/dist site/demo/ui

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
